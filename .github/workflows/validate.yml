name: "Terraform CI Pipeline"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  terraform-validate:
    name: "Auto code-check"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Terraform Engine
        uses: hashicorp/setup-terraform@v3

      - name: Initialize & Run Validation Test
        run: |
          # Use backend=false and standard init so the runner downloads provider schemas
          terraform init -backend=false
          terraform validate
